name: Build and Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'master'
    tags:
      - '*'
  pull_request:
    branches:
      - 'master'

env:
  RELEASE_NAME: DataEditorX.zip
  SOLUTION_NAME: DataEditorX.sln

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v3

    - name: Restore NuGet packages
      run: nuget restore $env:SOLUTION_NAME

    - name: Build
      run: msbuild $env:SOLUTION_NAME /t:Build /p:Configuration=Release

    - name: Pack
      run: |
        tar -cf $env:RELEASE_NAME --format=zip release

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: package
        path: ${{ env.RELEASE_NAME }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download Artifact
      uses: actions/download-artifact@v8
      with:
        name: package

    - name: GitHub Release
      env:
        GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        TAG_NAME: "${{ github.ref_name }}"
      run: |
        gh release create $TAG_NAME $RELEASE_NAME --title $TAG_NAME --generate-notes
