name: Build and Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'master'
    tags:
      - '*'
  pull_request:
    branches:
      - 'master'

jobs:
  build:
    runs-on: windows-2022

    env:
      Release_Name: DataEditorX.zip
      Solution_Name: DataEditorX.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v3

    - name: Restore NuGet packages
      run: nuget restore $env:Solution_Name

    - name: Build
      run: msbuild $env:Solution_Name /t:Build /p:Configuration=Release

    - name: Pack
      run: |
        tar -cf $env:Release_Name --format=zip release

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        path: ${{ env.Release_Name }}
  
    - name: GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        gh release create $env:TAG_NAME $env:Release_Name --title $env:TAG_NAME --generate-notes
